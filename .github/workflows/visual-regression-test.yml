name: Visual Regression Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression-test:
    if: >
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.actor != 'dependabot[bot]' ||
          startsWith(github.head_ref, 'dependabot/npm_and_yarn/')
        )
      )
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run prestart --ignore-scripts
      - run: npm run start --ignore-scripts
        background: true
      - run: npm run test:visual -- --verbose
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
      - name: Warn if no access to Percy token
        run: |
          if [[ -z $PERCY_TOKEN ]]; then
            echo "::warning title=${GITHUB_WORKFLOW}::Re-run manually to test changes on Percy"
          fi
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
